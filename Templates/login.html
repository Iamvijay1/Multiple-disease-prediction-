{% extends 'base.html' %}
{% load static %}

{% block title %}User Login{% endblock %}
{% block user_login %}active{% endblock %}

{% block content %}
    <title>.login aspx</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Roboto;
            background-repeat: no-repeat;
            background-size: cover;
            background: linear-gradient(-315deg, #231557 0%, #44107A 29%, #FF1361 67%, #FFF800 100%);
            height: 100vh;
            overflow: hidden;
        }
        .center{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 600px;
            width: 29vw;
            background: white;
            border-radius: 10px;
        }
        .center:hover{
            background-color:rgba(177, 211, 255, 0.429); ;
            color: rgb(255, 255, 255);
            font: white;
            text-decoration-color: white;
            
            transition: .5s;
            border-radius: 15px;
            border-color: #e9f4fb;
        }
        .center h1{
            text-align: center;
            padding: 0 0 20px 0;
            border-bottom: 1px solid silver;
        }
        .center form{
            padding: 0 40px;
            box-sizing: border-box;

        }
        form .txt_field{
            position: relative;
            border-bottom: 2px solid #adadad;
            margin: 30px 0;
        }
        .txt_field input{
            width: 100%;
            padding: 0 5px;
            height: 40px;
            font-size: 16px;
            border: none;
            background: none;
            outline: none;
        }
        .txt_field label{
            position: absolute;
            top: 50%;
            left: 5px;
            color: #adadad;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;

        }
        .txt_field span::before{
            content: '';
            position: absolute;
            top: 40px;
            left: 0;
            width: 0px;
            height: 2px;
            background: #2691d9;
            transition: .5s;
        }
        .txt_field input:focus ~ label,
        .txt_field input:valid ~ label{
            top: -5px;
            color: #2691d9;
        }
        .txt_field input:focus ~ span::before,
        .txt_field input:valid ~ span::before{
            width: 100%;
        }
        .pass{
            margin: -5px 0 20px 5px;
            color: #a6a6a6;
            cursor: pointer;
        }
        .pass:hover{
            text-decoration: underline;
        }
        input[type="Submit"]{
            width: 100%;
            height: 50px;
            border: 1px solid;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
        input[type="Submit"]:hover{
            background: #2691d9;
            color: #e9f4fb;
            transition: .5s;
        }
        .signup_link{
            margin: 30px 0;
            text-align: center;
            font-size: 16px;
            color: #666666;
        }
        .signup_link a{
            color: #2691d9;
            text-decoration: none;
        }
        .signup_link a:hover{
            text-decoration: underline;
        }
        .HomeAbout{
            width: 100vw;
            height: 25vh;
        }
    </style>
</head> 
<body>
    <div class="container" id="myForm">
        <div class="center">
            <h1>Login</h1>
            <form action="" method="POST">
                <div class="txt_field">
                    <input type="text" name="text" required>
                    <span></span>
                    <label>Username</label>
                </div>
                <div>
                    <div class="txt_field">
                        <input type="password" name="password" required>
                        <span></span>
                        <label>Password</label>
                    </div>
                    <div class="pass">Forget Password ?</div>
                    <br>
                    <input name="submit" type="Submit" value="Login">
                    <br><br>
                    
                    <input name="submit" onclick="closeForm()" type="Submit" value="Close">
                    <div class="signup_link">
                        Not a Member ? <a href="">Register</a>

                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

{% endblock %}
